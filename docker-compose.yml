services:
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.5-flash}
      - PORT=8080
      - FRONTEND_ORIGIN=http://localhost:3000
      - BATCH_SIZE=${BATCH_SIZE:-20}
      - MAX_RETRIES=${MAX_RETRIES:-3}

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:8080
    depends_on:
      - backend
